name: Publish

concurrency:
  group: publish
  cancel-in-progress: true

on:
  workflow_dispatch:
  # schedule:
  # - cron: '0 10 * * *'
    inputs:
      use_changelog:
        description: Update changelog using default settings? (don't overdo)
        type: boolean
        default: false

env:
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release
  AUDIO_REPO_TOKEN: ${{ secrets.AUDIO_REPO_TOKEN }}

jobs:
  changelog:
    uses: ./.github/workflows/update-changelog.yml
    if: inputs.use_changelog == true
    secrets: inherit
    permissions:
      contents: write

  package:
    name: Package ${{ matrix.name }}
    needs: changelog
    if: always() && (needs.changelog.result == 'success' || needs.changelog.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: client
            command: client
            restore: dotnet restore
          - name: server-win-x64
            command: server --platform win-x64
            restore: dotnet restore --runtime win-x64 /p:TargetOs=Windows
          - name: server-linux-x64
            command: server --platform linux-x64
            restore: dotnet restore --runtime linux-x64 /p:TargetOs=Linux

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true
          submodules: false

      - name: Checkout submodules
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth=1

      - name: Checkout ColonialMarinesAudio
        if: ${{ matrix.name == 'client' && env.AUDIO_REPO_TOKEN != '' }}
        uses: actions/checkout@v6.0.2
        with:
          repository: AU-14/ColonialMarinesAudio
          token: ${{ env.AUDIO_REPO_TOKEN }}
          path: __audio-overlay

      - name: Rsync CMAudio into Resources
        if: ${{ matrix.name == 'client' && env.AUDIO_REPO_TOKEN != '' }}
        run: |
          mkdir -p Resources/Audio/_CMU14/Private/
          rsync -a --delete \
            __audio-overlay/Resources/Audio/_CMU14/Private/ \
            Resources/Audio/_CMU14/Private/

      - uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.props
            **/*.targets
            **/packages.lock.json

      - name: Restore dependencies
        run: ${{ matrix.restore }}

      - name: Build Packaging
        run: dotnet build Content.Packaging --configuration ${{ env.CONFIGURATION }} --no-restore /m

      - name: Package ${{ matrix.name }}
        run: dotnet run --project Content.Packaging --configuration ${{ env.CONFIGURATION }} --no-build --no-restore -- ${{ matrix.command }} --no-restore

      - name: Upload ${{ matrix.name }} package
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.name }}
          path: release/*.zip
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish version
    if: always() && needs.package.result == 'success'
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true
          submodules: false

      - name: Checkout RobustToolbox
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --depth=1 RobustToolbox
          cd RobustToolbox
          git fetch --depth=1

      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Publish version
        run: Tools/publish_multi_request.py
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

- type: entity
  parent: CMWallMetal
  id: WicceWallMining
  name: wall
  suffix: mining
  description: A huge chunk of metal used to separate rooms.
  components:
  - type: Sprite
    sprite: _Wicce/Structures/Walls/mining.rsi
  - type: Icon
    sprite: _Wicce/Structures/Walls/mining.rsi
    state: mining
  - type: IconSmooth
    key: walls
    additionalKeys:
    - windows
    - doors
    base: mining
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: CMU14StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1125
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:ChangeConstructionNodeBehavior
        node: girder # This goes to the CM girder. We need a new one. But that's Later:tm:
      - !type:DoActsBehavior
        acts: ["Breakage"]


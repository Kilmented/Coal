- type: entity
  parent: CMUPaperCLF
  id: AUPaperCLFVeteranCLF
  name: Encrypted Message
  components:
  - type: Paper
    stampState: paper_stamp-clf
    stampedBy:
    - stampedColor: "#2e5a1e"
      stampedName: Coordinator
    content: >2-
      [bolditalic][color=#5C7042]══════════════════════════════════════════[/color][/bolditalic]
      [bold]Transmission:[/bold] [bold]#####################[/bold]

      [bold]Origin:[/bold] Cell "Crosswind"

      [bold]Sector:[/bold] KX-947 // Kestrel Reach

      [bold]Recipient:[/bold] Cell Coordinator // 17A-4F

      [color=#5C7042]──────────────────────────────────────────[/color]

      [bold]Operative,[/bold]

      • We're forwarding intelligence that concerns your territory.

      • A former Veteran Organizer associated with our movement has been identified operating somewhere inside your district. They vanished years ago following the Kestrel Reach withdrawals and have remained silent ever since.


      [bold]Understand exactly who you're dealing with.[/bold]

      • This individual coordinated logistics across multiple cells, maintained compartmentalized safehouse networks, trained new cell leaders, and planned actions against both corporate security and Colonial Marshals.

      • They know our habits. They know our signals. They know how we disappear.

      • Whether they abandoned the cause, lost faith, or simply chose another road no longer matters.


      [bold]Find them.[/bold]

      • If conviction still burns, [bold][color=#5C7042]welcome them home.[/color][/bold]

      • If it doesn't... ensure they are [bold][color=DarkRed]no longer a problem...[/color][/bold]

      Can't leave someone knowledge about cells in wild afterall...


      [bold]Proceed carefully. A Veteran is more dangerous alone than most squads are together.[/bold]


      We'll never know your name.
      You'll never know ours.


      [bolditalic]Burn this paper after you're done reading...[/bolditalic]

      [bold][color=#5C7042][italic]The Frontier remembers.[/italic][/color][/bold]
      [color=#5C7042]══════════════════════════════════════════[/color]


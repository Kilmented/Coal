- type: entity
  parent: BaseStructure
  id: ESBaseComputerTerminal
  name: computer
  placement:
    mode: SnapgridCenter
  abstract: true
  components:
  - type: Sprite
    drawdepth: Objects
    sprite: Structures/Machines/computers.rsi
    noRot: true
    layers:
    - map: [ "computerLayerBody" ]
      state: computer
    - map: [ "computerLayerKeyboard" ]
      state: generic_keyboard
    - map: [ "computerLayerScreen" ]
      state: aiupload
    - map: [ "computerLayerKeys" ]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
        computerLayerKeys:
          True: { visible: true, shader: unshaded }
          False: { visible: true, shader: shaded }
      enum.WiresVisuals.MaintenancePanelState:
        enum.WiresVisualLayers.MaintenancePanel:
          True: { visible: false }
          False: { visible: true }
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.35,0.25,0.35"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: LitOnPowered
  - type: PointLight
    radius: 1.4
    energy: 40
    curveFactor: 1.0
  - type: EmitSoundOnUIOpen
    sound:
      collection: Keyboard
      params:
        volume: -1
        variation: 0.10
        pitch: 1.10  # low pitch keyboard sounds feel kinda weird
    blacklist:
      tags:
      - NoConsoleSound
  - type: InteractionOutline
  - type: Rotatable
  - type: Anchorable
    flags:
    - Anchorable
  - type: MeleeSound
    soundGroups:
      Brute:
        collection: GlassSmash
  - type: Computer
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: ExtensionCableReceiver
  - type: ActivatableUIRequiresPower
  - type: LightningTarget
    priority: 1
  - type: RequireProjectileTarget
  - type: Electrified
    enabled: false
    usesApcPower: true
  - type: WiresPanel
  - type: WiresVisuals
  - type: Wires
    boardName: wires-board-name-computer
    layoutId: Computer
  - type: ContainerContainer
    containers:
      board: !type:Container

- type: entity
  parent: ESBaseComputerTerminal
  id: ESComputerTerminalEmergencyAccess
  name: emergency access terminal
  description: A hefty terminal that can remotely toggle access on airlocks using the printed access key on the door. You remembered what the key was, right?
  components:
  - type: Sprite
    layers:
    - map: [ "computerLayerBody" ]
      state: computer
    - map: [ "computerLayerKeyboard" ]
      state: generic_keyboard
    - map: [ "computerLayerScreen" ]
      state: aiupload
    - map: [ "computerLayerKeys" ]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: PointLight
    color: "#ffff55"
  - type: ESEmergencyAccessConsole
  - type: UseDelay
    delay: 0.5
  - type: ActivatableUI
    key: enum.ESEmergencyAccessConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ESEmergencyAccessConsoleUiKey.Key:
        type: ESEmergencyAccessConsoleBui
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface

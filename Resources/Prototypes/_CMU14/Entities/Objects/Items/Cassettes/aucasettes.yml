# These cassete players/tapes serve as a quick to reuse base
- type: entity
  abstract: true
  parent: RMCCassettePlayer
  id: AU14CassettePlayer

- type: entity
  abstract: true
  parent: RMCCassetteTapeBase
  id: AU14CassetteTape
  components:
  - type: CassetteTape
    songs:
    - /Audio/_RMC14/Lobby/enemy_is_unknown.ogg
    - /Audio/_RMC14/Lobby/Time_Is_Running_Out.ogg
    - /Audio/_RMC14/Hijack/storm_the_iron_hive.ogg
    - /Audio/_RMC14/Hijack/Last_Stand.ogg


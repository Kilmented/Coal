- type: entity
  parent: RehydratableAnimalCube
  id: CMUMonkeyCube
  name: monkey cube
  components:
  - type: Rehydratable
    possibleSpawns:
    - CMMobSmallHostMonkey
  - type: Tag
    tags:
    - Meat
    - MonkeyCube
  - type: Sprite
    sprite: _CMU14/Objects/Items/Food/monkey_cubes.rsi
    state: monkeycube

- type: entity
  parent: BaseWrappedCube
  name: monkey cube
  id: CMUMonkeyCubeWrapped
  description: Unwrap this to get a monkey cube.
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMUMonkeyCube
  - type: Tag
    tags:
    - MonkeyCube
  - type: Sprite
    sprite: _CMU14/Objects/Items/Food/monkey_cubes.rsi
    state: monkeycubewrap

- type: entity
  parent: RMCBoxCardboard
  name: monkey cube box
  id: CMUMonkeyCubeBox
  description: Drymate brand monkey cubes. Just add water!
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/boxes.rsi
    state: monkeycubebox
  - type: Item
    sprite: _RMC14/Objects/Storage/boxes.rsi
    size: Large
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,7,1
  - type: StorageFill
    contents:
      - id: CMUMonkeyCubeWrapped
        amount: 8


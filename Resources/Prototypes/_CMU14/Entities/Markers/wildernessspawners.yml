    - state: decal
  - type: RandomDecalSpawner
    radius: 0.3
    zIndex: 5
    deleteSpawnerAfterSpawn: true
    decals:
    - Grassa1
    - Grassa2
    - Grassa3
    - Grassa4
    - Grassa5
    - Grassb1
    - Grassb2
    - Grassb3
    - Grassb4
    - Grassb5
- type: reagent
  parent: CMReagent
  id: CMUMethamphetamine
  name: reagent-name-cmu-methamphetamine
  desc: reagent-desc-cmu-methamphetamine
  flavor: bitter
  physicalDesc: reagent-physical-desc-crystalline
  color: "#f5f5ff"
  overdose: 25
  criticalOverdose: 40
  metabolisms:
    Poison:
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 1
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 25
        damage:
          types:
            Poison: 3
            Asphyxiation: 2
    Narcotic:
      metabolismRate: 0.1
      effects:
      - !type:MovespeedModifier
        walkSpeedModifier: 1.4
        sprintSpeedModifier: 1.4
      - !type:Jitter
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentThreshold
          min: 25
        effectProto: StatusEffectCMUTachycardia
        time: 6
        type: Add
        refresh: true
      - !type:ChemVomit
        conditions:
        - !type:ReagentThreshold
          min: 40
        probability: 0.15

# Building overhaul (z-level): the tiered structural support beams.
#
# Each beam is the single-tile navalis beam (half-scale sprite + 1-tile wall fixture) plus the wall behaviours
# players expect: a real health pool (Damageable on the marine structural container), the "Integrity: #%" examine
# (RMCIntegrityExamine + ExaminableDamage), breaching/explosion compatibility (RMCWallExplosionDeletable), and a
# Destructible whose destruction threshold is proportionate to its material (wood weak, plasteel tough) that drops
# the matching sheets when broken. StructuralSupport makes it hold up the level above.
#
# NOTE: these parent the existing colored navalis beams (BaseStructure-based) rather than CMBaseWall - parenting
# the wall base dropped the prototypes at load (its IconSmooth sprite setup conflicted with the scaled sprite
# override), so the wall behaviours are added here explicitly instead.

# Blue - the staircase's own support beam (spawned by ZStairSystem, not built). Anchors the staircase.
# NON-BLOCKING (hard: false): it sits right next to the stair shaft, and a solid beam there could wall the
# player off from stepping back onto the return staircase. It stays shootable/attackable via Destructible.
- type: entity
  parent: AU14NavalisSupportBeamBlue
  id: AU14NavalisSupportBeamBlue1Tile
  name: steel support beam
  description: A sturdy steel beam holding up the structure above. Destroying it brings down what it supports.
  suffix: AU14 z-build, 1 tile
  components:
  - type: Sprite
    noRot: true
    sprite: _AU14/Structures/navalis_support_beam.rsi
    state: support_beam_blue
    scale: 0.5, 0.5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 1000
        hard: false
  - type: StructuralSupport
    isAnchor: true
    isVerticalSupport: true
    cantileverSpan: 2
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: ExaminableDamage
    messages: RMCWallMessages
  - type: RMCIntegrityExamine
  - type: RMCWallExplosionDeletable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1800
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]


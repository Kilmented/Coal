# Building overhaul (z-level): handheld structural scanner.
# Use it in hand to toggle a client-side roof-stability heat-map that only the holder sees.
# Borrows ONLY the SalvageMagnet sprite (scaled down to item size); it is a plain held item with no
# multitool functionality (the multitool was just an earlier placeholder).

- type: entity
  parent: BaseItem
  id: AU14StructuralScanner
  name: structural scanner
  suffix: AU14 z-build
  description: A handheld scanner that overlays the stability of dug-out ceilings. Toggle it in hand to see where a cavern is about to cave in.
  components:
  - type: Sprite
    sprite: Structures/Machines/salvage.rsi
    state: salvage-magnet
    scale: 0.5, 0.5
  - type: Item
    size: Small
  - type: StructuralScanner

# Building overhaul: barricades as normal construction-ghost recipes (instead of the RMC "build here" radial).
# Each is a child of the real barricade entity (inherits its look/health/fold behavior) plus a Construction
# component pointing at a clean ghost graph, so it places with the standard construction ghost. Costs mirror the
# original barricade graphs. All live in the "Barricades" spawnlist.

# --- Metal barricade ---
- type: constructionGraph
  id: AU14BarricadeMetalGraph
  start: start
  graph:
  - node: start
    edges:
    - to: built
      completed:
      - !type:SnapToGrid
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 3
  - node: built
    entity: AU14BarricadeMetal
    edges:
    # Deconstruct. Mirrors the original RMC barricade graphs: unbolt it first, then unscrew and pry it apart,
    # refunding less the more damaged it is. These AU14 ghost-build graphs never had a way back out of the
    # "built" node, so anything raised through the construction menu could not be taken down again.
    - to: start
      completed:
      - !type:ConditionalAction
        condition:
          !type:MinHealth
          threshold: 1
          byProportion: true
        action:
          !type:SpawnPrototype
          prototype: CMSheetMetal1
          amount: 4
        else:
          !type:ConditionalAction
          condition:
            !type:MinHealth
            threshold: 0.78
            byProportion: true
          action:
            !type:SpawnPrototype
            prototype: CMSheetMetal1
            amount: 3
          else:
            !type:ConditionalAction
            condition:
              !type:MinHealth
              threshold: 0.56
              byProportion: true
            action:
              !type:SpawnPrototype
              prototype: CMSheetMetal1
              amount: 2
      - !type:ConditionalAction
        condition:
          !type:IsBarbed
        action:
          !type:SpawnPrototype
          prototype: BarbedWire1
          amount: 1
      - !type:DeleteEntity
      conditions:
      - !type:EntityAnchored
        anchored: false
      steps:
      - tool: Screwing
        doAfter: 1
      - tool: Prying
        doAfter: 2

- type: entity
  parent: CMBarricadeMetal
  id: AU14BarricadeMetal
  suffix: AU14 ghost-build
  components:
  - type: Construction
    graph: AU14BarricadeMetalGraph
    node: built

- type: construction
  id: AU14BarricadeMetalRecipe
  name: metal barricade
  description: A military-grade metal barricade.
  graph: AU14BarricadeMetalGraph
  startNode: start
  targetNode: built
  category: construction-category-structures
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  isCM: true
  spawnlist: AU14
  conditions:
  - !type:TileNotBlocked
  - !type:TileBarricadeClear


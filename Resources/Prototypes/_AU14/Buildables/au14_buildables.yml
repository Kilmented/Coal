# Building overhaul: a curated set of constructable CM/RMC structures for the construction menu.
#
# Pattern follows the in-repo CM recipes (e.g. BarricadeMetalGraph in _RMC14/Recipes/Construction): a build
# edge that consumes material(s), and a deconstruct edge (crowbar) that returns the same materials as sheets and
# deletes the structure. Each buildable is a child of the original CM/RMC entity (so it inherits sprite, health,
# and the parent's own destroy-drops) plus a Construction component (required for the build target) and a
# StructuralSupport component (so it takes part in the z-level support graph - needs a beam below on upper z).
#
# Health tiers come from the chosen parent: wood < metal < reinforced < heavy reinforced. Normal walls are cheap
# metal; stronger walls cost plasteel + metal, as requested. Material -> returned sheet entity:
#   CMSteel -> CMSheetMetal1 ; CMPlasteel -> CMSheetPlasteel1 ; RMCWood -> RMCPlankWood1 ; RMCPlastic -> RMCSheetPlastic1
#
# Spawnlists split by category (Walls / Furniture / Decoration); AU14 is the "All" spawnlist and shows them all.

# =========================================================================================================
# WALLS
# =========================================================================================================

# --- Metal wall (normal, cheap metal, standard health) ---
- type: constructionGraph
  id: AU14BuildWallMetalGraph
  start: start
  graph:
  - node: start
    edges:
    - to: built
      completed:
      - !type:SnapToGrid
      steps:
      - material: CMSteel
        amount: 2
        doAfter: 2
  - node: built
    entity: AU14BuildWallMetal
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: CMSheetMetal1
        amount: 2
      - !type:DeleteEntity
      steps:
      - tool: Prying
        doAfter: 3

- type: entity
  parent: CMWallMetal
  id: AU14BuildWallMetal
  suffix: AU14 buildable
  components:
  - type: Construction
    graph: AU14BuildWallMetalGraph
    node: built
  - type: StructuralSupport
    cantileverSpan: 2

- type: construction
  id: AU14BuildWallMetalRecipe
  name: metal wall
  description: A metal wall to separate rooms. Cheap, made from metal.
  graph: AU14BuildWallMetalGraph
  startNode: start
  targetNode: built
  category: Walls
  objectType: Structure
  placementMode: SnapgridCenter
  canRotate: false
  isCM: true
  spawnlist: AU14
  conditions:
  - !type:TileNotBlocked


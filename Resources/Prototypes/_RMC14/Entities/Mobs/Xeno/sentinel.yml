    - ActionXenoSlowingSpit
    - ActionXenoScatteredSpit
    - ActionXenoParalyzingSlash
    - ActionXenoDevolve
  - type: XenoEvolution
    strains:
    - RMCXenoSentinelToxic
  - type: XenoAcid
  - type: XenoParalyzingSlash
  - type: XenoSlowingSpit
  - type: XenoScatteredSpit
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 30
  - type: RMCActionOrder
    id: CMXenoSentinel

- type: entity

# Govfor
- type: entity
  parent: RMCOverwatchConsole
  id: RMCOverwatchConsoleGovfor
  suffix: Govfor
  components:
  - type: TacticalMapComputer
    faction: govfor
  - type: OverwatchConsole
    canOrbitalBombardment: true
    group: GOVFOR
  - type: AU14CallsignConsole
    faction: govfor
  # child UserInterface overrides replace the whole interfaces dict, so the
  # parent keys are redeclared alongside the callsign directory
  - type: UserInterface
    interfaces:
      enum.OverwatchConsoleUI.Key:
        type: OverwatchConsoleBui
      enum.TacticalMapComputerUi.Key:
        type: TacticalMapComputerBui
      enum.DialogUiKey.Key:
        type: DialogBui
      enum.AU14CallsignConsoleUI.Key:
        type: AU14CallsignConsoleBui

- type: entity
  parent: RMCOverwatchConsoleGovfor
  id: RMCOverwatchConsoleGovforRotating
  suffix: Govfor, Rotating
  components:
  - type: Sprite
    overrideDir: South
    enableOverrideDir: false
  - type: TacticalMapComputer
    faction: govfor

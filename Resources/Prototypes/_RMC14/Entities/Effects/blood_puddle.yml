- type: entity
  name: blood puddle
  id: BloodDecalPuddle
  description: A puddle of blood.
  placement:
    mode: SnapgridCenter
  components:
  - type: TimedDespawn
    lifetime: 60
  - type: Clickable
  - type: Slippery
  - type: Transform
    noRot: true
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      slipFixture:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        mask:
        - ItemMask
        layer:
        - SlipLayer
        hard: false
  - type: SolutionContainerManager
    solutions:
      puddle:
        maxVol: 1000
  - type: Puddle
  - type: PuddleFootPrints
  - type: PuddleDecalVisuals
    decals:
    - RMCDecalBloodFloor1
    - RMCDecalBloodFloor2
    - RMCDecalBloodFloor3
    - RMCDecalBloodFloor4
    - RMCDecalBloodFloor5
    - RMCDecalBloodFloor6
    - RMCDecalBloodFloor7
  - type: MixableSolution
    solution: puddle
  - type: Appearance
  - type: ActiveEdgeSpreader
  - type: EdgeSpreader
    id: Puddle
  - type: StepTrigger
  - type: Drink
    delay: 3
    transferAmount: 1
    solution: puddle
    examinable: false
  - type: ExaminableSolution
    solution: puddle
  - type: BadDrink
  - type: IgnoresFingerprints
  - type: Tag
    tags:
    - DNASolutionScannable

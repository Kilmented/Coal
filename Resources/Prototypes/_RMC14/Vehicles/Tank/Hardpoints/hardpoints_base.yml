  - type: Sprite
    sprite: _CMU14/Structures/Vehicles/fv150/exterior.rsi
    state: tank_turret_0
  - type: HardpointItem
    hardpointType: Turret
    vehicleFamily: Tank
    slotType: Turret
    damageMultiplier: 0.05
    repairRate: 0.008
  - type: HardpointIntegrity
    maxIntegrity: 450
  - type: VehicleTurret
    rotateToCursor: true
    stabilizedRotation: false
    rotationSpeed: 95
    showOverlay: true
    overlayRsi: _CMU14/Structures/Vehicles/fv150/exterior.rsi
    overlayState: tank_turret_0
    overlayDamagedState: tank_turret_1
    useDirectionalOffsets: false
    pixelOffsetNorth: "0,-10"
    pixelOffsetEast: "-10,0"
    pixelOffsetSouth: "0,10"
    pixelOffsetWest: "10,0"
  - type: ItemSlots
    slots:
      turret-cannon:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      turret-launcher:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
  - type: HardpointSlots
    vehicleFamily: Tank
    slots:
    - id: turret-cannon
      hardpointType: Cannon
      slotType: Cannon
      required: false
      insertDelay: 2.0
    - id: turret-launcher
      hardpointType: Launcher
      slotType: Launcher
      required: false
      insertDelay: 2.0      

